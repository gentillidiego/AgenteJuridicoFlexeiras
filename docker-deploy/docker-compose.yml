services:
  opengravity:
    build: .
    image: opengravity:latest
    container_name: opengravity
    restart: unless-stopped

    # Porta exposta para a rede externa (host:container)
    # Se usar Nginx/Traefik na VPS, pode remover o "3333:" do host
    # e deixar só o container port, mapeando via proxy reverso
    ports:
      - "3333:3333"

    # Variáveis de ambiente — carregadas do .env na mesma pasta
    env_file:
      - .env
    environment:
      - NODE_ENV=production

    # Volumes persistentes — garante que dados NÃO se percam ao reiniciar
    volumes:
      # Banco de memória SQLite
      - ./memory.db:/app/memory.db
      # Sessão WhatsApp (evita escanear QR toda vez)
      - ./whatsapp-session:/app/whatsapp-session
      # Personalidade dinâmica (pode editar no host e o agent recarrega)
      - ./personality.md:/app/personality.md
      # Configuração do gog CLI (Google OAuth tokens)
      - ./gogcli-config:/root/.config/gogcli

    # Healthcheck — Portainer mostrará "healthy" quando a API responder
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3333/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

    # Logging para não encher o disco
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
